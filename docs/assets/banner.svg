<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="100%" height="100%">
  <!-- Background Base -->
  <rect width="1280" height="320" fill="#111111" />
  
  <!-- Subtle Gradient Glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#111111" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="0%" r="80%" fx="100%" fy="0%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#111111" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#glow)" />
  <rect width="1280" height="320" fill="url(#glow2)" />

  <!-- Grid overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.05" />
  </pattern>
  <rect width="1280" height="320" fill="url(#grid)" />

  <!-- Logo Group -->
  <g transform="translate(100, 60)">
    <!-- Shield/Brain Outline -->
    <path d="M 60 40 C 30 40 10 60 10 90 C 10 120 30 140 60 140 L 140 140 C 170 140 190 120 190 90 C 190 60 170 40 140 40 C 130 0 90 -20 50 0 C 20 0 10 20 0 40 Z" 
          fill="none" stroke="#ffffff" stroke-width="8" stroke-linejoin="round" opacity="0.9" />
    <!-- Lightning Bolt -->
    <path d="M 120 -10 L 50 100 L 100 100 L 60 210 L 140 80 L 90 80 Z" 
          fill="#a3e635" stroke="#111111" stroke-width="4" stroke-linejoin="miter" />
  </g>

  <!-- Text -->
  <text x="360" y="160" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="76" font-weight="900" fill="#ffffff" letter-spacing="-1.5">
    Retard<tspan fill="#a3e635">Bench</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="365" y="210" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="28" font-weight="500" fill="#a1a1aa" letter-spacing="0.5">
    The Anti-Leaderboard for Uncensored LLMs
  </text>

  <!-- Side Tech Elements -->
  <g transform="translate(1050, 80)" opacity="0.5">
    <rect x="0" y="0" width="120" height="15" rx="4" fill="#a3e635" />
    <rect x="0" y="30" width="80" height="15" rx="4" fill="#ffffff" />
    <rect x="0" y="60" width="100" height="15" rx="4" fill="#a3e635" opacity="0.5" />
    <rect x="0" y="90" width="140" height="15" rx="4" fill="#ffffff" opacity="0.3" />
    <rect x="0" y="120" width="90" height="15" rx="4" fill="#ffffff" opacity="0.7" />
    <rect x="0" y="150" width="110" height="15" rx="4" fill="#a3e635" />
  </g>
</svg>
