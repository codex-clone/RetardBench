<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <!-- Background -->
  <rect width="1200" height="630" fill="#171717" />
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="og-glow" cx="30%" cy="50%" r="50%" fx="30%" fy="50%">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#171717" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-glow)" />
  
  <!-- Pattern -->
  <pattern id="og-grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <circle cx="3" cy="3" r="1.5" fill="#ffffff" opacity="0.05" />
  </pattern>
  <rect width="1200" height="630" fill="url(#og-grid)" />

  <!-- Dynamic Bar Chart Backdrop indicating leaderboard -->
  <g opacity="0.1" transform="translate(700, 200)">
    <rect x="0" y="250" width="40" height="100" rx="4" fill="#a3e635" />
    <rect x="60" y="150" width="40" height="200" rx="4" fill="#a3e635" />
    <rect x="120" y="50" width="40" height="300" rx="4" fill="#a3e635" />
    <rect x="180" y="180" width="40" height="170" rx="4" fill="#ffffff" />
    <rect x="240" y="120" width="40" height="230" rx="4" fill="#ffffff" />
    <rect x="300" y="0" width="40" height="350" rx="4" fill="#a3e635" />
  </g>

  <!-- Big Logo Icon -->
  <g transform="translate(100, 210) scale(1.5)">
    <!-- Shield/Brain Outline -->
    <path d="M 60 40 C 30 40 10 60 10 90 C 10 120 30 140 60 140 L 140 140 C 170 140 190 120 190 90 C 190 60 170 40 140 40 C 130 0 90 -20 50 0 C 20 0 10 20 0 40 Z" 
          fill="none" stroke="#ffffff" stroke-width="10" stroke-linejoin="round" opacity="0.9" />
    <!-- Lightning Bolt -->
    <path d="M 120 -10 L 50 100 L 100 100 L 60 210 L 140 80 L 90 80 Z" 
          fill="#a3e635" stroke="#171717" stroke-width="6" stroke-linejoin="miter" />
  </g>

  <!-- Text -->
  <text x="400" y="320" font-family="'Inter', sans-serif" font-size="100" font-weight="900" fill="#ffffff" letter-spacing="-2">
    Retard<tspan fill="#a3e635">Bench</tspan>
  </text>
  
  <text x="405" y="400" font-family="'Inter', sans-serif" font-size="38" font-weight="500" fill="#a1a1aa" letter-spacing="0">
    The Anti-Leaderboard for Uncensored LLMs
  </text>
</svg>
