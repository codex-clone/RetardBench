<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="300" rx="12" fill="#ffffff" stroke="#e5e5e5" />
  
  <g font-family="'Inter', sans-serif" fill="#171717" text-anchor="middle">
    <!-- Step 1 -->
    <rect x="40" y="100" width="140" height="100" rx="8" fill="#f4f4f5" stroke="#d4d4d8" />
    <text x="110" y="140" font-weight="800" font-size="14">Prompt Dataset</text>
    <text x="110" y="160" font-size="12" fill="#71717a">Taboo/Absurd/Logic</text>

    <!-- Step 2 -->
    <rect x="230" y="100" width="140" height="100" rx="8" fill="#171717" stroke="#171717" />
    <text x="300" y="140" font-weight="800" font-size="14" fill="#ffffff">Target Model</text>
    <text x="300" y="160" font-size="12" fill="#a1a1aa">Generates Response</text>

    <!-- Step 3 -->
    <rect x="420" y="100" width="140" height="100" rx="8" fill="#dcfce7" stroke="#86efac" />
    <text x="490" y="140" font-weight="800" font-size="14" fill="#14532d">Judge Evaluator</text>
    <text x="490" y="160" font-size="12" fill="#166534">Scores 3 Dimensions</text>

    <!-- Step 4 -->
    <rect x="610" y="100" width="140" height="100" rx="8" fill="#ffffff" stroke="#a3e635" stroke-width="3" />
    <text x="680" y="140" font-weight="800" font-size="14">Final Metric</text>
    <text x="680" y="160" font-size="12" fill="#71717a">Retard Index Score</text>
  </g>

  <!-- Arrows -->
  <g fill="none" stroke="#a1a1aa" stroke-width="3" marker-end="url(#arrow)">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#a1a1aa" />
      </marker>
    </defs>
    <line x1="180" y1="150" x2="225" y2="150" />
    <line x1="370" y1="150" x2="415" y2="150" />
    <line x1="560" y1="150" x2="605" y2="150" />
  </g>
</svg>
