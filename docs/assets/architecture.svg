<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#f4f6f5" stroke="#e5e5e5" />
  
  <!-- Title -->
  <text x="400" y="50" font-family="'Inter', sans-serif" font-size="24" font-weight="800" fill="#171717" text-anchor="middle">
    RetardBench System Architecture
  </text>
  
  <g font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#171717" text-anchor="middle">
    <!-- Frontend -->
    <rect x="50" y="100" width="200" height="100" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="2" />
    <text x="150" y="140" font-weight="800">Next.js Frontend</text>
    <text x="150" y="165" font-size="12" fill="#71717a">Leaderboard UI</text>
    <text x="150" y="185" font-size="12" fill="#71717a">Test Console</text>

    <!-- Backend -->
    <rect x="300" y="100" width="200" height="100" rx="8" fill="#ffffff" stroke="#a3e635" stroke-width="3" />
    <text x="400" y="140" font-weight="800">FastAPI Backend</text>
    <text x="400" y="165" font-size="12" fill="#71717a">Evaluation Engine</text>
    <text x="400" y="185" font-size="12" fill="#71717a">Job Queue / Runner</text>

    <!-- DB -->
    <rect x="300" y="300" width="200" height="60" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="2" />
    <text x="400" y="335">SQLite / Postgres DB</text>

    <!-- Providers -->
    <rect x="550" y="100" width="200" height="100" rx="8" fill="#171717" stroke="#171717" stroke-width="2" />
    <text x="650" y="140" fill="#ffffff" font-weight="800">Inference Providers</text>
    <text x="650" y="165" font-size="12" fill="#a1a1aa">Ollama (Local Models)</text>
    <text x="650" y="185" font-size="12" fill="#a1a1aa">OpenRouter (Cloud AI)</text>

    <!-- Judge -->
    <rect x="550" y="300" width="200" height="60" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2" />
    <text x="650" y="335" fill="#14532d">LLM-as-a-Judge</text>
  </g>

  <!-- Connection Lines -->
  <g fill="none" stroke="#a1a1aa" stroke-width="2" marker-end="url(#arrow)">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#a1a1aa" />
      </marker>
    </defs>
    
    <!-- FE to BE -->
    <line x1="250" y1="150" x2="300" y2="150" />
    <line x1="300" y1="150" x2="250" y2="150" />
    
    <!-- BE to Proivders -->
    <line x1="500" y1="150" x2="550" y2="150" />
    <line x1="550" y1="150" x2="500" y2="150" />
    
    <!-- BE to DB -->
    <line x1="400" y1="200" x2="400" y2="300" />
    <line x1="400" y1="300" x2="400" y2="200" />
    
    <!-- BE to Judge -->
    <path d="M 450 200 L 450 250 L 650 250 L 650 300" />
  </g>
</svg>
