<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="500" height="500" rx="100" fill="#171717" />
  
  <!-- Outer glowing rings -->
  <circle cx="250" cy="250" r="150" fill="none" stroke="#a3e635" stroke-width="8" stroke-dasharray="20 15" opacity="0.6" stroke-linecap="round"/>
  <circle cx="250" cy="250" r="180" fill="none" stroke="#a3e635" stroke-width="4" stroke-dasharray="10 30" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Brain/Cloud shape (Chaos) -->
  <path d="M 180 200 C 150 200 130 220 130 250 C 130 280 150 300 180 300 L 320 300 C 350 300 370 280 370 250 C 370 220 350 200 320 200 C 310 160 270 140 230 160 C 200 160 190 180 180 200 Z" 
        fill="none" stroke="#ffffff" stroke-width="14" stroke-linejoin="round" />
        
  <!-- Lightning Bolt (Energy/Benchmark) -->
  <path d="M 280 130 L 210 260 L 260 260 L 220 380 L 300 240 L 250 240 Z" 
        fill="#a3e635" stroke="#171717" stroke-width="6" stroke-linejoin="miter" />

  <!-- Target/Crosshair indicating evaluation -->
  <circle cx="250" cy="250" r="40" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.4" />
  <line x1="250" y1="190" x2="250" y2="210" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="250" y1="290" x2="250" y2="310" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="190" y1="250" x2="210" y2="250" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="290" y1="250" x2="310" y2="250" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
</svg>
